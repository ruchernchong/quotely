name: 'Generate Daily Quote'
description: 'AI-powered motivational quote generator with automated storage and optional LangFuse observability'
author: 'ruchernchong'

inputs:
  google-generative-ai-api-key:
    description: 'Google Generative AI API key for Gemini model'
    required: true
  langfuse-public-key:
    description: 'LangFuse public key for observability (optional)'
    required: false
  langfuse-secret-key:
    description: 'LangFuse secret key for observability (optional)'
    required: false
  langfuse-host:
    description: 'LangFuse host URL (optional, e.g., https://cloud.langfuse.com)'
    required: false
  auto-commit:
    description: 'Automatically commit and push changes to the repository'
    required: false
    default: 'true'
  git-user-name:
    description: 'Git user.name for automated commits'
    required: false
    default: 'github-actions[bot]'
  git-user-email:
    description: 'Git user.email for automated commits'
    required: false
    default: '41898282+github-actions[bot]@users.noreply.github.com'

runs:
  using: 'composite'
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

    - name: Setup Node
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version-file: '.node-version'

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile

    - name: Generate quote
      shell: bash
      run: pnpm exec tsx src/generate-quote.ts
      env:
        GOOGLE_GENERATIVE_AI_API_KEY: ${{ inputs.google-generative-ai-api-key }}
        LANGFUSE_PUBLIC_KEY: ${{ inputs.langfuse-public-key }}
        LANGFUSE_SECRET_KEY: ${{ inputs.langfuse-secret-key }}
        LANGFUSE_HOST: ${{ inputs.langfuse-host }}

    - name: Commit and push changes
      if: inputs.auto-commit == 'true'
      shell: bash
      env:
        GIT_USER_NAME: ${{ inputs.git-user-name }}
        GIT_USER_EMAIL: ${{ inputs.git-user-email }}
      run: |
        if [[ -n "$(git status --porcelain)" ]]; then
          git config user.name "$GIT_USER_NAME"
          git config user.email "$GIT_USER_EMAIL"
          git add quotes.json quotes/
          HUSKY=0 git commit -m "chore: update quote [skip ci]"
          git push
        else
          echo "No changes to commit."
        fi

branding:
  icon: 'message-circle'
  color: 'black'
